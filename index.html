<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Shikaku Puzzles — LiDECX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #e8e8e8;
      --muted: #555;
      --text: #999;
      --bright: #fff;
      --green: #4ade80;
      --sun: #FFD166;
      --purple: #8b5cf6;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e5e5e5;
      --accent: #1a1a1a;
      --muted: #888;
      --text: #444;
      --bright: #000;
      --green: #16a34a;
      --sun: #f59e0b;
      --purple: #7c3aed;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s ease, color 0.2s ease;
      overscroll-behavior: none;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }

    header {
      padding: 24px 0;
      display: flex;
      justify-content: flex-end;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--bright);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      transition: all 0.15s;
    }

    .theme-toggle:hover {
      background: var(--surface);
      border-color: var(--muted);
    }

    #main-content { padding: 40px 0 60px; min-height: 70vh; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      margin-bottom: 32px;
    }

    .hero-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 6vw, 2.5rem);
      font-weight: 600;
      color: var(--bright);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .hero-sub {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 40px;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 28px 0;
      margin-top: 60px;
    }

    .footer-inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .hidden { display: none !important; }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px 20px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
    }

    .card:hover {
      border-color: var(--purple);
      background: rgba(139, 92, 246, 0.05);
    }

    .unit-val {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      color: var(--bright);
      font-weight: 600;
    }

    .unit-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .game-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .btn-icon {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--bright);
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .btn-icon:hover:not(:disabled) { background: var(--border); }
    .btn-icon:disabled { opacity: 0.4; cursor: not-allowed; }
    
    .hint-text { color: var(--sun); font-weight: 600; }

    #game-container {
      position: relative;
      width: 100%;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      touch-action: none;
      user-select: none;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }

    #game-container.won {
      border-color: var(--green);
    }

    #grid {
      display: grid;
      width: 100%;
    }

    .cell {
      border: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: var(--bright);
      box-sizing: border-box;
      transition: opacity 0.3s;
    }

    #game-container.won .cell { border-color: transparent; }

    #rects-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }

    .drawn-rect {
      position: absolute;
      border: 2px solid var(--purple);
      background: rgba(139, 92, 246, 0.15);
      border-radius: 4px;
      box-sizing: border-box;
      transition: background 0.2s, border-color 0.2s;
    }

    .drawn-rect.hint {
      border-color: var(--sun);
      background: rgba(255, 209, 102, 0.2);
    }

    .drawn-rect.error {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.15);
    }

    #game-container.won .drawn-rect {
      border-color: var(--green);
      background: rgba(74, 222, 128, 0.15);
    }

    .preview-rect {
      position: absolute;
      border: 2px dashed var(--muted);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      box-sizing: border-box;
    }

    .action-row {
      margin-top: 24px;
      min-height: 50px;
      display: flex;
      justify-content: center;
    }

    .btn-primary {
      background: var(--bright);
      color: var(--bg);
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
      animation: fadeInPop 0.3s ease-out forwards;
    }

    .btn-primary:active { transform: scale(0.95); }

    @keyframes fadeInPop {
      0% { opacity: 0; transform: translateY(10px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body data-theme="dark">

  <div class="container">
    <header>
      <button class="theme-toggle" id="themeToggle">LIGHT</button>
    </header>
  </div>

  <section id="main-content">
    <div class="container">
      
      <div id="screen-menu">
        <div class="badge">✦ LOGIC PUZZLE</div>
        <h1 class="hero-name">Shikaku</h1>
        <p class="hero-sub">Разделите поле на прямоугольники. Внутри каждого должна быть одна цифра, равная площади прямоугольника.</p>

        <div class="grid">
          <div class="card" onclick="startGame('easy')">
            <span class="unit-val">Easy</span><span class="unit-label">6 × 6</span>
          </div>
          <div class="card" onclick="startGame('medium')">
            <span class="unit-val">Medium</span><span class="unit-label">7 × 9</span>
          </div>
          <div class="card" onclick="startGame('hard')">
            <span class="unit-val">Hard</span><span class="unit-label">9 × 12</span>
          </div>
          <div class="card" onclick="startGame('expert')">
            <span class="unit-val">Expert</span><span class="unit-label">13 × 17</span>
          </div>
          <div class="card" onclick="startGame('master')">
            <span class="unit-val">Master</span><span class="unit-label">14 × 20</span>
          </div>
          <div class="card" onclick="startGame('extreme')">
            <span class="unit-val">Extreme</span><span class="unit-label">16 × 24</span>
          </div>
        </div>
      </div>

      <div id="screen-game" class="hidden">
        <div class="game-toolbar">
          <button class="btn-icon" onclick="showMenu()">← Меню</button>
          <div style="display: flex; gap: 8px;">
            <button class="btn-icon" id="hint-btn" onclick="useHint()">
              💡 <span class="hint-text" id="hint-count">3</span>
            </button>
            <button class="btn-icon" onclick="restartLevel()" title="Начать заново">↻</button>
          </div>
        </div>

        <div id="game-container">
          <div id="grid"></div>
          <div id="rects-layer"></div>
        </div>

        <div class="action-row" id="action-row">
        </div>
      </div>

    </div>
  </section>

  <footer>
    <div class="footer-inner">
      <span>© <span id="year"></span> LiDECX</span>
      <span>v2.2.0</span>
    </div>
  </footer>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;

    const savedTheme = localStorage.getItem('theme') || 'dark';
    body.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'dark' ? 'LIGHT' : 'DARK';

    themeToggle.addEventListener('click', () => {
      const isDark = body.getAttribute('data-theme') === 'dark';
      const newTheme = isDark ? 'light' : 'dark';
      body.setAttribute('data-theme', newTheme);
      themeToggle.textContent = isDark ? 'DARK' : 'LIGHT';
      localStorage.setItem('theme', newTheme);
    });

    document.getElementById('year').textContent = new Date().getFullYear();

    const CONFIGS = {
      easy: { c: 6, r: 6 },
      medium: { c: 7, r: 9 },
      hard: { c: 9, r: 12 },
      expert: { c: 13, r: 17 },
      master: { c: 14, r: 20 },
      extreme: { c: 16, r: 24 }
    };

    let state = {
      diff: 'easy',
      grid: [],
      solution: [],
      userRects: [],
      hints: 3,
      isWon: false,
      drawing: false,
      start: null,
      end: null
    };

    function generate(cols, rows) {
      let regions = [{ x: 0, y: 0, w: cols, h: rows }];
      let targetCount = Math.floor((cols * rows) / 4.5); 
      
      for (let i = 0; i < 150; i++) {
        if (regions.length >= targetCount) break;
        
        regions.sort((a, b) => (b.w * b.h) - (a.w * a.h));
        let reg = regions[0];
        
        if (reg.w * reg.h <= 3) break;

        let splitH;
        if (reg.w > reg.h * 2) splitH = false;
        else if (reg.h > reg.w * 2) splitH = true;
        else splitH = Math.random() > 0.5;
        
        if (splitH && reg.h > 1) {
          let split = Math.floor(Math.random() * (reg.h - 1)) + 1;
          regions.shift();
          regions.push({ x: reg.x, y: reg.y, w: reg.w, h: split });
          regions.push({ x: reg.x, y: reg.y + split, w: reg.w, h: reg.h - split });
        } else if (!splitH && reg.w > 1) {
          let split = Math.floor(Math.random() * (reg.w - 1)) + 1;
          regions.shift();
          regions.push({ x: reg.x, y: reg.y, w: split, h: reg.h });
          regions.push({ x: reg.x + split, y: reg.y, w: reg.w - split, h: reg.h });
        }
      }

      let grid = Array(rows).fill(0).map(() => Array(cols).fill(0));
      regions.forEach(r => {
        let rx = r.x + Math.floor(Math.random() * r.w);
        let ry = r.y + Math.floor(Math.random() * r.h);
        grid[ry][rx] = r.w * r.h;
      });
      
      return { grid, solution: regions };
    }

    const viewMenu = document.getElementById('screen-menu');
    const viewGame = document.getElementById('screen-game');
    const container = document.getElementById('game-container');
    const actionRow = document.getElementById('action-row');

    function startGame(diff) {
      state.diff = diff;
      state.hints = 3;
      state.isWon = false;
      state.userRects = [];
      container.classList.remove('won');
      
      const { grid, solution } = generate(CONFIGS[diff].c, CONFIGS[diff].r);
      state.grid = grid;
      state.solution = solution;
      
      viewMenu.classList.add('hidden');
      viewGame.classList.remove('hidden');
      
      renderBaseGrid();
      renderRects();
      updateUI();
    }

    function showMenu() {
      viewGame.classList.add('hidden');
      viewMenu.classList.remove('hidden');
    }

    function restartLevel() {
      state.userRects = [];
      state.hints = 3;
      state.isWon = false;
      container.classList.remove('won');
      updateUI();
      renderRects();
    }

    function renderBaseGrid() {
      const { c, r } = CONFIGS[state.diff];
      const gridEl = document.getElementById('grid');
      gridEl.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
      gridEl.innerHTML = '';
      
      let fs = c > 14 ? '0.65rem' : (c > 9 ? '0.8rem' : '1.1rem');

      for (let i = 0; i < r; i++) {
        for (let j = 0; j < c; j++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.style.aspectRatio = '1';
          cell.style.fontSize = fs;
          cell.textContent = state.grid[i][j] > 0 ? state.grid[i][j] : '';
          gridEl.appendChild(cell);
        }
      }
    }

    function renderRects() {
      const layer = document.getElementById('rects-layer');
      const { c, r } = CONFIGS[state.diff];
      layer.innerHTML = '';

      state.userRects.forEach(rect => {
        const el = document.createElement('div');
        el.className = 'drawn-rect';
        if (rect.isHint) el.classList.add('hint');
        
        let area = rect.w * rect.h;
        let nums = 0, val = 0;
        for (let i = rect.y; i < rect.y + rect.h; i++) {
          for (let j = rect.x; j < rect.x + rect.w; j++) {
            if (state.grid[i][j] > 0) { nums++; val = state.grid[i][j]; }
          }
        }
        if (nums !== 1 || val !== area) el.classList.add('error');

        el.style.left = `${(rect.x / c) * 100}%`;
        el.style.top = `${(rect.y / r) * 100}%`;
        el.style.width = `${(rect.w / c) * 100}%`;
        el.style.height = `${(rect.h / r) * 100}%`;
        layer.appendChild(el);
      });

      if (state.drawing && state.start && state.end) {
        const el = document.createElement('div');
        el.className = 'preview-rect';
        const x = Math.min(state.start.x, state.end.x);
        const y = Math.min(state.start.y, state.end.y);
        const w = Math.abs(state.start.x - state.end.x) + 1;
        const h = Math.abs(state.start.y - state.end.y) + 1;
        el.style.left = `${(x / c) * 100}%`;
        el.style.top = `${(y / r) * 100}%`;
        el.style.width = `${(w / c) * 100}%`;
        el.style.height = `${(h / r) * 100}%`;
        layer.appendChild(el);
      }
    }

    function getCoords(e) {
      const box = container.getBoundingClientRect();
      const touch = e.touches && e.touches.length > 0 ? e.touches[0] : e;
      const x = Math.floor(((touch.clientX - box.left) / box.width) * CONFIGS[state.diff].c);
      const y = Math.floor(((touch.clientY - box.top) / box.height) * CONFIGS[state.diff].r);
      if (x >= 0 && x < CONFIGS[state.diff].c && y >= 0 && y < CONFIGS[state.diff].r) return { x, y };
      return null;
    }

    container.addEventListener('pointerdown', e => {
      if (state.isWon) return;
      const pos = getCoords(e);
      if (!pos) return;

      const idx = state.userRects.findIndex(r => pos.x >= r.x && pos.x < r.x + r.w && pos.y >= r.y && pos.y < r.y + r.h);
      if (idx !== -1) {
        state.userRects.splice(idx, 1);
        renderRects();
        checkWin();
        return;
      }

      state.drawing = true;
      state.start = pos;
      state.end = pos;
      container.setPointerCapture(e.pointerId);
      renderRects();
    });

    container.addEventListener('pointermove', e => {
      if (!state.drawing) return;
      const pos = getCoords(e);
      if (pos) { 
        state.end = pos; 
        renderRects(); 
      }
    });

    container.addEventListener('pointerup', e => {
      if (!state.drawing) return;
      state.drawing = false;
      
      const x = Math.min(state.start.x, state.end.x);
      const y = Math.min(state.start.y, state.end.y);
      const w = Math.abs(state.start.x - state.end.x) + 1;
      const h = Math.abs(state.start.y - state.end.y) + 1;
      
      const overlap = state.userRects.some(r => !(x + w <= r.x || x >= r.x + r.w || y + h <= r.y || y >= r.y + r.h));
      if (!overlap) {
        state.userRects.push({ x, y, w, h });
      }
      
      renderRects();
      checkWin();
    });

    function useHint() {
      if (state.hints <= 0 || state.isWon) return;
      
      const unplaced = state.solution.filter(s => 
        !state.userRects.some(u => u.x === s.x && u.y === s.y && u.w === s.w && u.h === s.h)
      );
      
      if (unplaced.length > 0) {
        const hint = unplaced[Math.floor(Math.random() * unplaced.length)];
        state.userRects = state.userRects.filter(r => 
          (hint.x + hint.w <= r.x || hint.x >= r.x + r.w || hint.y + hint.h <= r.y || hint.y >= r.y + r.h)
        );
        state.userRects.push({ ...hint, isHint: true });
        
        state.hints--;
        updateUI();
        renderRects();
        checkWin();
      }
    }

    function checkWin() {
      const { c, r } = CONFIGS[state.diff];
      let totalArea = 0;
      let valid = true;
      
      state.userRects.forEach(rect => {
        let area = rect.w * rect.h;
        totalArea += area;
        let nums = 0, val = 0;
        for (let i = rect.y; i < rect.y + rect.h; i++) {
          for (let j = rect.x; j < rect.x + rect.w; j++) {
            if (state.grid[i][j] > 0) { nums++; val = state.grid[i][j]; }
          }
        }
        if (nums !== 1 || val !== area) valid = false;
      });

      if (valid && totalArea === c * r) {
        state.isWon = true;
        container.classList.add('won');
        updateUI();
      }
    }

    function updateUI() {
      document.getElementById('hint-count').textContent = state.hints;
      document.getElementById('hint-btn').disabled = state.hints <= 0 || state.isWon;
      
      actionRow.innerHTML = '';
      if (state.isWon) {
        const btn = document.createElement('button');
        btn.className = 'btn-primary';
        btn.textContent = 'Следующий уровень ➔';
        btn.onclick = () => startGame(state.diff);
        actionRow.appendChild(btn);
      }
    }
  </script>
</body>
</html>
