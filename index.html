<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #e8e8e8;
      --muted: #555;
      --text: #999;
      --bright: #fff;
      --green: #4ade80;
      --sun: #FFD166;
      --timer-bg: #1a1a1a;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e5e5e5;
      --accent: #1a1a1a;
      --muted: #888;
      --text: #444;
      --bright: #000;
      --green: #16a34a;
      --sun: #f59e0b;
      --timer-bg: #e2e8f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s ease;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }

    header {
      padding: 24px 0;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .theme-toggle, .search-input {
      background: none;
      border: 1px solid var(--border);
      color: var(--bright);
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      transition: all 0.15s;
    }

    .theme-toggle {
      cursor: pointer;
      padding: 6px 12px;
    }

    .theme-toggle:hover {
      background: var(--surface);
      border-color: var(--muted);
    }

    .search-container {
      margin-bottom: 24px;
      position: sticky;
      top: 12px;
      z-index: 100;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      backdrop-filter: blur(10px);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--sun);
    }

    #hero { padding: 20px 0 60px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      margin-bottom: 24px;
    }

    .hero-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1.8rem, 5vw, 2.2rem);
      font-weight: 600;
      color: var(--bright);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .students-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .student-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .student-header {
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .student-name {
      font-family: 'JetBrains Mono', monospace;
      color: var(--bright);
      font-size: 1rem;
      font-weight: 600;
    }

    .student-class {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: 'JetBrains Mono', monospace;
    }

    .exam-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(128, 128, 128, 0.05);
    }

    .exam-item:last-child { border-bottom: none; }

    .exam-name {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .exam-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--sun);
    }

    .timer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--green);
      background: var(--timer-bg);
      padding: 4px 8px;
      border-radius: 4px;
      min-width: 110px;
      text-align: center;
    }

    .timer.expired { color: var(--muted); }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      margin-top: 40px;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    @media (max-width: 500px) {
      .exam-item { flex-direction: column; align-items: flex-start; gap: 6px; }
      .timer { width: 100%; text-align: left; }
    }
  </style>
</head>

    { fullName: "Щавелев Андрей Егорович", exams: [{ subject: "Математика", date: "2026-06-02" }, { subject: "Физика", date: "2026-06-05" }, { subject: "Русский язык", date: "2026-06-09" }, { subject: "Информатика", date: "2026-06-16" }] },
    { fullName: "Щавелев Илья Егорович", exams: [{ subject: "Математика", date: "2026-06-02" }, { subject: "Физика", date: "2026-06-05" }, { subject: "Русский язык", date: "2026-06-09" }, { subject: "Информатика", date: "2026-06-16" }] }
  ];

  const searchInput = document.getElementById('searchInput');
  const grid = document.getElementById('studentsGrid');

  function getTimeRemaining(targetDate) {
    const now = new Date();
    const target = new Date(targetDate);
    target.setHours(9, 0, 0, 0);
    const diff = target - now;
    if (diff <= 0) return { expired: true, text: "ЗАВЕРШЕНО ✓" };
    
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);
    return { expired: false, text: `${days}д ${hours}ч ${minutes}м ${seconds}с` };
  }

  function render() {
    const query = searchInput.value.toLowerCase();
    const filtered = studentsData.filter(s => s.fullName.toLowerCase().includes(query));
    
    grid.innerHTML = filtered.map(student => `
      <div class="student-card">
        <div class="student-header">
          <div class="student-name">${student.fullName}</div>
          <div class="student-class">9В • ГИА-9</div>
        </div>
        ${student.exams.map(exam => {
          const timer = getTimeRemaining(exam.date);
          const dateParts = exam.date.split('-');
          return `
            <div class="exam-item">
              <div>
                <div class="exam-name">${exam.subject}</div>
                <div class="exam-date">${dateParts[2]}.${dateParts[1]}.${dateParts[0]}</div>
              </div>
              <div class="timer ${timer.expired ? 'expired' : ''}">${timer.text}</div>
            </div>
          `;
        }).join('')}
      </div>
    `).join('');
  }

  searchInput.addEventListener('input', render);
  
  const themeToggle = document.getElementById('themeToggle');
  themeToggle.addEventListener('click', () => {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    themeToggle.textContent = isDark ? 'DARK' : 'LIGHT';
    localStorage.setItem('theme', next);
  });

  const saved = localStorage.getItem('theme') || 'dark';
  document.body.setAttribute('data-theme', saved);
  themeToggle.textContent = saved === 'dark' ? 'LIGHT' : 'DARK';
  document.getElementById('year').textContent = new Date().getFullYear();

  setInterval(render, 1000);
  render();
</script>

</html>
