<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>Password Generator — LiDECX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;900&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #e8e8e8;
      --muted: #555;
      --text: #999;
      --bright: #fff;
      --green: #4ade80;
      --primary: #6366f1;
      --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e5e5e5;
      --accent: #1a1a1a;
      --muted: #888;
      --text: #444;
      --bright: #000;
      --green: #16a34a;
      --primary: #4f46e5;
      --gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    }

    body.blood-mode {
      --bg: #020000;
      --surface: #0a0000;
      --border: #3a0000;
      --accent: #ff0000;
      --text: #a44;
      --bright: #fcc;
      --primary: #f00;
      --gradient: linear-gradient(135deg, #900 0%, #300 100%);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow-x: hidden;
      width: 100%;
      position: relative;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glitchPulse { 0% { box-shadow: 0 0 20px rgba(255,0,0,0.1); border-color: #300; } 50% { box-shadow: 0 0 50px rgba(255,0,0,0.6); border-color: #f00; } 100% { box-shadow: 0 0 20px rgba(255,0,0,0.1); border-color: #300; } }
    @keyframes textGlitch { 
      0% { transform: translate(0); text-shadow: 3px 0 0 red, -3px 0 0 #300; }
      20% { transform: translate(-3px, 3px); text-shadow: -3px 0 0 red, 3px 0 0 #300; }
      40% { transform: translate(-3px, -3px); text-shadow: 3px 0 0 red, -3px 0 0 #300; }
      60% { transform: translate(3px, 3px); text-shadow: -3px 0 0 red, -3px 0 0 #300; }
      80% { transform: translate(3px, -3px); text-shadow: 3px 0 0 red, -3px 0 0 #300; }
      100% { transform: translate(0); text-shadow: none; }
    }
    @keyframes insaneGlitch {
      0%, 100% { opacity: 1; transform: scale(1) skew(0deg) translate(-50%, -50%); filter: blur(0); }
      10% { opacity: 0.8; transform: scale(1.05) skew(5deg) translate(-48%, -52%); filter: blur(2px) drop-shadow(0 0 50px red); }
      20% { opacity: 0.1; transform: scale(0.9) skew(-10deg) translate(-52%, -48%); }
      30% { opacity: 1; transform: scale(1.1) skew(15deg) translate(-50%, -50%); filter: contrast(200%) drop-shadow(0 0 100px darkred); }
      35% { opacity: 0; }
      40% { opacity: 0.9; transform: scale(1) skew(0deg) translate(-50%, -50%); }
    }
    @keyframes dripViscous {
      0% { transform: translateY(-100%) scaleX(1); opacity: 1; }
      100% { transform: translateY(110vh) scaleX(0.5); opacity: 0; }
    }
    @keyframes smileBleed {
      0% { transform: scaleY(0); opacity: 0; }
      20% { transform: scaleY(1); opacity: 1; }
      80% { transform: scaleY(3) translateY(10px); opacity: 0.8; }
      100% { transform: scaleY(4) translateY(20px); opacity: 0; }
    }
    @keyframes crtFlicker {
      0% { opacity: 0.02; } 50% { opacity: 0.05; } 100% { opacity: 0.02; }
    }

    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Inter', sans-serif; 
      transition: background 0.3s ease, color 0.3s ease; 
      min-height: 100vh; 
    }
    
    .blood-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 999; display: none; overflow: hidden; }
    body.blood-mode .blood-overlay { display: block; }

    .scanline {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(255, 0, 0, 0.05) 50%);
      background-size: 100% 4px;
      z-index: 1005;
      animation: crtFlicker 0.1s infinite;
    }

    .blood-drip {
      position: fixed; top: 0; background: linear-gradient(to bottom, #500 0%, #b00 80%, #f00 100%);
      z-index: 1002; animation: dripViscous linear forwards;
      box-shadow: 0 0 10px rgba(255,0,0,0.8);
      transform-origin: top center;
    }

    .spider-container { position: fixed; z-index: 1003; filter: drop-shadow(0 5px 8px #000); }
    
    .scary-smile-mega {
      position: fixed; top: 50%; left: 50%; width: 80vw; max-width: 800px;
      transform: translate(-50%, -50%); z-index: 900; opacity: 0; pointer-events: none;
      animation: insaneGlitch 6s infinite steps(2, end);
    }
    
    .blood-puddle-mega {
      position: fixed; bottom: -50px; left: -10%; width: 120%; height: 250px;
      background: radial-gradient(ellipse at 50% 100%, #600 0%, #300 30%, #100 60%, transparent 100%);
      z-index: 998; filter: blur(3px) contrast(1.5);
      transform: scaleY(0.5); transform-origin: bottom;
    }

    .container { max-width: 680px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 10; }
    
    header { padding: 24px 0; display: flex; justify-content: flex-end; }
    
    .theme-toggle {
      background: none; border: 1px solid var(--border); color: var(--bright);
      cursor: pointer; padding: 6px 12px; border-radius: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
      transition: all 0.15s; font-weight: 600;
    }
    body.blood-mode .theme-toggle { 
      border-color: #f00; color: #fff; background: #900; 
      box-shadow: 0 0 25px #f00; animation: textGlitch 0.1s infinite; 
      padding: 8px 16px; font-weight: 800;
    }

    #hero { padding: 40px 0 60px; animation: fadeIn 0.6s ease-out; position: relative; z-index: 1000; }
    .badge { display: inline-flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; margin-bottom: 32px; background: var(--surface); }
    body.blood-mode .badge { color: #fcc; border-color: #f00; background: rgba(50,0,0,0.8); }
    
    .hero-name { font-family: 'JetBrains Mono', monospace; font-size: clamp(2.5rem, 8vw, 3.5rem); font-weight: 600; color: var(--bright); line-height: 1.1; margin-bottom: 12px; letter-spacing: -2px; }
    body.blood-mode .hero-name { color: #fff; animation: textGlitch 0.15s infinite; font-weight: 900; }
    .hero-sub { font-size: 1.1rem; color: var(--muted); margin-bottom: 40px; }
    body.blood-mode .hero-sub { color: #f55; font-weight: 600; }
    
    .generator-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; transition: 0.3s; position: relative; overflow: hidden; }
    body.blood-mode .generator-card { animation: glitchPulse 2s infinite; background: rgba(10,0,0,0.9); border: 2px solid #500; }
    
    .output-container { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
    body.blood-mode .output-container { border-color: #f00; background: #000; box-shadow: inset 0 0 15px rgba(255,0,0,0.3); }
    #passwordOutput { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; color: var(--bright); word-break: break-all; font-weight: 600; }
    body.blood-mode #passwordOutput { color: #f00; text-shadow: 0 0 10px #f00; font-weight: 800; }
    
    .copy-btn { background: var(--gradient); border: none; color: white; padding: 10px 16px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
    body.blood-mode .copy-btn { background: #f00; box-shadow: 0 0 15px #f00; font-weight: 800; }
    
    .control-group { margin-bottom: 24px; }
    .label-row { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 600; margin-bottom: 16px; color: var(--accent); }
    
    input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; outline: none; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--bright); border: 2px solid var(--primary); }
    body.blood-mode input[type="range"] { background: #300; }
    body.blood-mode input[type="range"]::-webkit-slider-thumb { background: #f00; border-color: #fff; }

    .checkbox-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 24px; }
    .check-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; transition: 0.2s; color: var(--text); }
    body.blood-mode .check-item { border-color: #500; background: rgba(255,0,0,0.05); color: #faa; }
    
    .generate-btn { width: 100%; margin-top: 32px; padding: 18px; border-radius: 8px; border: none; background: var(--gradient); color: white; font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
    body.blood-mode .generate-btn { background: #900; border: 2px solid #f00; box-shadow: 0 0 30px rgba(255,0,0,0.4); animation: textGlitch 0.2s infinite alternate-reverse; font-weight: 800; }
    
    .strength-section { margin-top: 20px; }
    .strength-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
    .strength-meter { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0%; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    
    footer { border-top: 1px solid var(--border); padding: 28px 0; margin-top: 60px; position: relative; z-index: 1000; }
    body.blood-mode footer { border-color: #500; }
    .footer-inner { max-width: 680px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); }
    body.blood-mode .footer-inner { color: #f55; font-weight: 600; }
    
    @media (max-width: 480px) { .checkbox-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-theme="dark">

  <div class="blood-overlay" id="bloodOverlay">
    <div class="scanline"></div>
    <div class="blood-puddle-mega"></div>
    <div class="scary-smile-mega" id="smile">
      <svg viewBox="0 0 600 400" width="100%" filter="drop-shadow(0 0 30px #f00)">
        <path d="M50 200 Q300 400 550 200 Q300 230 50 200" fill="#050000" stroke="#200" stroke-width="10"/>
        <g fill="#e8e8e8" stroke="#300" stroke-width="3">
          <rect x="150" y="200" width="25" height="40" rx="3"/><rect x="185" y="215" width="25" height="50" rx="3"/>
          <rect x="220" y="225" width="25" height="55" rx="3"/><rect x="255" y="230" width="25" height="60" rx="3"/>
          <rect x="290" y="230" width="25" height="60" rx="3"/><rect x="325" y="230" width="25" height="60" rx="3"/>
          <rect x="360" y="225" width="25" height="55" rx="3"/><rect x="395" y="215" width="25" height="50" rx="3"/>
          <rect x="430" y="200" width="25" height="40" rx="3"/>
        </g>
        <circle cx="200" cy="100" r="25" fill="#fff"/><circle cx="200" cy="100" r="5" fill="#f00"/>
        <circle cx="400" cy="100" r="25" fill="#fff"/><circle cx="400" cy="100" r="5" fill="#f00"/>
        <path d="M265 290 L265 350" stroke="#900" stroke-width="8" stroke-linecap="round" style="animation: smileBleed 1.5s infinite;"/>
        <path d="M335 290 L335 380" stroke="#b00" stroke-width="10" stroke-linecap="round" style="animation: smileBleed 2.1s infinite 0.7s;"/>
      </svg>
    </div>
    <div id="dropsContainer"></div>
    <div id="spidersContainer"></div>
  </div>

  <div class="container">
    <header>
      <button class="theme-toggle" id="themeToggle">LIGHT</button>
    </header>
  </div>
  
  <section id="hero">
    <div class="container">
      <div class="badge" data-orig="✦ LIDECX DOUBLE-CLICK">✦ LIDECX DOUBLE-CLICK</div>
      <h1 class="hero-name" data-orig="SafePass">SafePass</h1>
      <p class="hero-sub" data-orig="Генератор паролей. Полная конфиденциальность.">Генератор паролей. Полная конфиденциальность.</p>
      
      <div class="generator-card">
        <div class="output-container">
          <span id="passwordOutput">Нажми «Создать»</span>
          <button class="copy-btn" data-orig="COPY" onclick="copyPassword()">COPY</button>
        </div>
        
        <div class="strength-section">
          <div class="strength-label">
            <span>УРОВЕНЬ ЗАЩИТЫ</span>
            <span id="strengthText">—</span>
          </div>
          <div class="strength-meter">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
        </div>
        
        <div class="control-group" style="margin-top: 24px;">
          <div class="label-row">
            <span data-orig="Длина пароля">Длина пароля</span>
            <span id="lengthVal" style="color: var(--primary)">16</span>
          </div>
          <input type="range" id="lengthSlider" min="4" max="64" value="16">
        </div>
        
        <div class="checkbox-grid">
          <label class="check-item"><input type="checkbox" id="upper" checked> <span data-orig="ВЕРХНИЙ РЕГИСТР">ВЕРХНИЙ РЕГИСТР</span></label>
          <label class="check-item"><input type="checkbox" id="lower" checked> <span data-orig="НИЖНИЙ РЕГИСТР">НИЖНИЙ РЕГИСТР</span></label>
          <label class="check-item"><input type="checkbox" id="numbers" checked> <span data-orig="ЦИФРЫ 0-9">ЦИФРЫ 0-9</span></label>
          <label class="check-item"><input type="checkbox" id="symbols" checked> <span data-orig="СИМВОЛЫ !@#">СИМВОЛЫ !@#</span></label>
        </div>
        
        <button class="generate-btn" data-orig="СГЕНЕРИРОВАТЬ ПАРОЛЬ" onclick="generatePassword()">СГЕНЕРИРОВАТЬ ПАРОЛЬ</button>
      </div>
    </div>
  </section>
  
  <footer>
    <div class="footer-inner">
      <span data-orig="© 2026 LiDECX">© <span id="year"></span> LiDECX</span>
      <span data-orig="v.VOID-Ω.99">v.VOID-Ω.99</span>
    </div>
  </footer>

  <script>
    (function() {
      const body = document.body;
      const themeToggle = document.getElementById('themeToggle');
      const lengthSlider = document.getElementById('lengthSlider');
      const lengthVal = document.getElementById('lengthVal');
      const passwordOutput = document.getElementById('passwordOutput');
      const strengthFill = document.getElementById('strengthFill');
      const strengthText = document.getElementById('strengthText');
      const heroSub = document.querySelector('.hero-sub');
      const badge = document.querySelector('.badge');

      let dblClickTimer = null;
      let horrorIntervals = [];
      const glitchWords = [
        "ERROR", "FATAL", "DEATH", "RUN", "0xDEAD", "666", "SYSTEM FAILURE", 
        "BLOOD", "NO ESCAPE", "HELP ME", "VOID", "CORRUPTED", "KILL", 
        "SACRIFICE", "NIGHTMARE", "YOUR SOUL", "HELL", "ABYSS", "WATCHING", 
        "STALKER", "EYES", "SMILE", "I SEE YOU", "NO PRIVACY", "WE OWN YOU"
      ];

      function initTheme() {
        const savedTheme = localStorage.getItem('site-theme') || 'dark';
        body.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? 'LIGHT' : 'DARK';
        updateSliderTrack();
      }

      function updateSliderTrack() {
        const val = (lengthSlider.value - lengthSlider.min) / (lengthSlider.max - lengthSlider.min) * 100;
        const primary = getComputedStyle(body).getPropertyValue('--primary').trim();
        const border = getComputedStyle(body).getPropertyValue('--border').trim();
        lengthSlider.style.background = `linear-gradient(to right, ${primary} ${val}%, ${border} ${val}%)`;
      }

      themeToggle.addEventListener('click', () => {
        if (dblClickTimer) {
          clearTimeout(dblClickTimer);
          dblClickTimer = null;
          body.classList.toggle('blood-mode');
          if (body.classList.contains('blood-mode')) {
            themeToggle.textContent = "DIE";
            heroSub.setAttribute('data-orig', 'КОНФИДЕНЦИАЛЬНОСТИ НЕТ. МЫ ВИДИМ ВСЁ.');
            heroSub.textContent = 'КОНФИДЕНЦИАЛЬНОСТИ НЕТ. МЫ ВИДИМ ВСЁ.';
            badge.innerText = `✦ ${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            startMeat();
          } else {
            stopMeat();
            heroSub.setAttribute('data-orig', 'Генератор паролей. Полная конфиденциальность.');
            heroSub.textContent = 'Генератор паролей. Полная конфиденциальность.';
            badge.innerText = badge.getAttribute('data-orig');
            const isDark = body.getAttribute('data-theme') === 'dark';
            themeToggle.textContent = isDark ? 'LIGHT' : 'DARK';
          }
          updateSliderTrack();
          generatePassword();
          return;
        }
        dblClickTimer = setTimeout(() => {
          if (!body.classList.contains('blood-mode')) {
            const isDark = body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('site-theme', newTheme);
            themeToggle.textContent = isDark ? 'DARK' : 'LIGHT';
            updateSliderTrack();
            generatePassword();
          }
          dblClickTimer = null;
        }, 250);
      });

      function startMeat() {
        const dropTimer = setInterval(() => {
          const drop = document.createElement('div');
          drop.className = 'blood-drip';
          drop.style.left = (Math.random() * 100) + '%';
          drop.style.width = (Math.random() * 6 + 2) + 'px';
          const dur = Math.random() * 2 + 1;
          drop.style.animationDuration = dur + 's';
          document.getElementById('dropsContainer').appendChild(drop);
          setTimeout(() => drop.remove(), dur * 1000);
        }, 150);
        horrorIntervals.push(dropTimer);

        const textNodes = document.querySelectorAll('[data-orig]');
        const textTimer = setInterval(() => {
          if (Math.random() > 0.4) {
            const el = textNodes[Math.floor(Math.random() * textNodes.length)];
            const orig = el.getAttribute('data-orig');
            el.innerText = glitchWords[Math.floor(Math.random() * glitchWords.length)];
            el.style.color = '#f00';
            setTimeout(() => { el.innerText = orig; el.style.color = ''; }, 150);
          }
          if(body.classList.contains('blood-mode') && Math.random() > 0.95) {
             badge.innerText = `✦ ${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
          }
        }, 250);
        horrorIntervals.push(textTimer);

        const spiders = [];
        for (let i = 0; i < 4; i++) {
          const s = document.createElement('div');
          s.className = 'spider-container';
          s.style.width = '40px';
          s.style.height = '40px';
          s.innerHTML = `<svg viewBox="0 0 100 100" width="100%"><circle cx="50" cy="50" r="15" fill="#000"/><path d="M10 10 L50 50 M90 10 L50 50 M10 90 L50 50 M90 90 L50 50" stroke="#000" stroke-width="6"/><circle cx="43" cy="45" r="3" fill="#f00"/><circle cx="57" cy="45" r="3" fill="#f00"/></svg>`;
          document.getElementById('spidersContainer').appendChild(s);
          spiders.push({ el: s, x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4 });
        }
        const spiderMover = setInterval(() => {
          spiders.forEach(s => {
            s.x += s.vx; s.y += s.vy;
            if (s.x < 0 || s.x > window.innerWidth - 40) s.vx *= -1;
            if (s.y < 0 || s.y > window.innerHeight - 40) s.vy *= -1;
            s.el.style.left = s.x + 'px';
            s.el.style.top = s.y + 'px';
            s.el.style.transform = `rotate(${Math.atan2(s.vy, s.vx) * 180 / Math.PI + 90}deg)`;
          });
        }, 30);
        horrorIntervals.push(spiderMover);
      }

      function stopMeat() {
        horrorIntervals.forEach(clearInterval);
        horrorIntervals = [];
        document.getElementById('dropsContainer').innerHTML = '';
        document.getElementById('spidersContainer').innerHTML = '';
        document.querySelectorAll('[data-orig]').forEach(el => { el.innerText = el.getAttribute('data-orig'); el.style.color = ''; });
      }

      function generatePassword() {
        const length = +lengthSlider.value;
        let charset = "";
        if (document.getElementById('upper').checked) charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (document.getElementById('lower').checked) charset += "abcdefghijklmnopqrstuvwxyz";
        if (document.getElementById('numbers').checked) charset += "0123456789";
        if (document.getElementById('symbols').checked) charset += "!@#$%^&*()_+=-";
        
        if (!charset) {
          passwordOutput.textContent = "ВЫБЕРИТЕ ПАРАМЕТРЫ";
          strengthFill.style.width = "0%";
          return;
        }
        
        let pass = "";
        for (let i = 0; i < length; i++) pass += charset[Math.floor(Math.random() * charset.length)];
        passwordOutput.textContent = pass;
        
        let width = (length / 64) * 100;
        strengthFill.style.width = width + "%";
        if (body.classList.contains('blood-mode')) {
          strengthFill.style.background = "#f00";
          strengthText.textContent = "БЕЗНАДЕЖНО";
        } else {
          strengthFill.style.background = width < 35 ? "#ef4444" : width < 70 ? "#fbbf24" : "var(--green)";
          strengthText.textContent = width < 35 ? "СЛАБЫЙ" : width < 70 ? "СРЕДНИЙ" : "НАДЁЖНЫЙ";
        }
      }

      function copyPassword() {
        navigator.clipboard.writeText(passwordOutput.textContent);
        const btn = document.querySelector('.copy-btn');
        const orig = btn.getAttribute('data-orig');
        btn.textContent = body.classList.contains('blood-mode') ? "УКРАДЕНО" : "DONE";
        setTimeout(() => btn.textContent = orig, 1000);
      }

      lengthSlider.addEventListener('input', (e) => {
        lengthVal.textContent = e.target.value;
        updateSliderTrack();
        generatePassword();
      });

      document.querySelectorAll('.check-item input').forEach(el => el.addEventListener('change', generatePassword));
      document.getElementById('year').textContent = new Date().getFullYear();

      initTheme();
      generatePassword();
      window.generatePassword = generatePassword;
      window.copyPassword = copyPassword;
    })();
  </script>
</body>
</html>
