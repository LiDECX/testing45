<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafePass — LiDECX Ultra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;900&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #e8e8e8;
      --muted: #555;
      --text: #999;
      --bright: #fff;
      --green: #4ade80;
      --primary: #6366f1;
      --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --blood-color: #8a0303;
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e5e5e5;
      --accent: #1a1a1a;
      --muted: #888;
      --text: #444;
      --bright: #000;
      --green: #16a34a;
      --primary: #4f46e5;
      --gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    }
    body.blood-mode {
      --bg: #020000;
      --surface: #0a0000;
      --border: #3a0000;
      --accent: #ff0000;
      --text: #a44;
      --bright: #fcc;
      --primary: #f00;
      --gradient: linear-gradient(135deg, #900 0%, #300 100%);
      overflow: hidden;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glitchPulse { 0% { box-shadow: 0 0 20px rgba(255,0,0,0.1); border-color: #300; } 50% { box-shadow: 0 0 50px rgba(255,0,0,0.6); border-color: #f00; } 100% { box-shadow: 0 0 20px rgba(255,0,0,0.1); border-color: #300; } }
    @keyframes textGlitch { 
      0% { transform: translate(0); text-shadow: 3px 0 0 red, -3px 0 0 #300; }
      20% { transform: translate(-3px, 3px); text-shadow: -3px 0 0 red, 3px 0 0 #300; }
      40% { transform: translate(-3px, -3px); text-shadow: 3px 0 0 red, -3px 0 0 #300; }
      60% { transform: translate(3px, 3px); text-shadow: -3px 0 0 red, 3px 0 0 #300; }
      80% { transform: translate(3px, -3px); text-shadow: 3px 0 0 red, -3px 0 0 #300; }
      100% { transform: translate(0); text-shadow: none; }
    }
    @keyframes insaneGlitch {
      0%, 100% { opacity: 1; transform: scale(1) skew(0deg); filter: blur(0); }
      10% { opacity: 0.8; transform: scale(1.05) skew(5deg); filter: blur(2px) drop-shadow(0 0 50px red); }
      20% { opacity: 0.1; transform: scale(0.9) skew(-10deg); }
      30% { opacity: 1; transform: scale(1.1) skew(15deg); filter: contrast(200%) drop-shadow(0 0 100px darkred); }
      35% { opacity: 0; }
      40% { opacity: 0.9; transform: scale(1) skew(0deg); }
    }
    @keyframes dripViscous {
      0% { transform: translateY(0) scaleX(1); opacity: 1; border-radius: 0 0 50% 50%; }
      50% { transform: translateY(50vh) scaleX(0.8); opacity: 1; border-radius: 0 0 100% 100%; }
      95% { transform: translateY(calc(100vh - 80px)) scaleX(0.5); opacity: 1; }
      100% { transform: translateY(calc(100vh - 60px)) scale(2, 0.1); opacity: 0; }
    }
    @keyframes smileBleed {
      0% { transform: scaleY(0); opacity: 0; }
      20% { transform: scaleY(1); opacity: 1; }
      80% { transform: scaleY(3) translateY(10px); opacity: 0.8; }
      100% { transform: scaleY(4) translateY(20px); opacity: 0; }
    }

    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: background 0.5s ease; min-height: 100vh; position: relative; }
    
    .blood-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 999; display: none; }
    body.blood-mode .blood-overlay { display: block; }

    .rusty-pipe {
      position: fixed; top: -15px; left: -5%; width: 110%; height: 80px;
      background: repeating-linear-gradient(90deg, #2b1104 0%, #4a1f0a 5%, #1a0802 10%);
      border-bottom: 8px solid #0a0301;
      box-shadow: inset 0 -20px 30px rgba(0,0,0,0.9), 0 15px 35px rgba(150,0,0,0.4);
      border-radius: 50% / 10px;
      z-index: 1001;
      filter: contrast(1.2) sepia(0.3);
    }
    .rusty-pipe::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at 20% 50%, rgba(200,50,0,0.2), transparent 10%),
                  radial-gradient(circle at 80% 50%, rgba(100,20,0,0.3), transparent 10%);
      mix-blend-mode: color-dodge;
    }

    .blood-drip {
      position: fixed; top: 50px; background: linear-gradient(to bottom, #500 0%, #b00 80%, #f00 100%);
      z-index: 1002; animation: dripViscous linear forwards;
      box-shadow: 0 0 10px rgba(255,0,0,0.8), inset 0 0 2px rgba(255,150,150,0.5);
      transform-origin: top center;
    }

    .spider-container { position: fixed; z-index: 1003; filter: drop-shadow(0 5px 8px #000); }
    
    .scary-smile-mega {
      position: fixed; top: 50%; left: 50%; width: 80vw; max-width: 800px;
      transform: translate(-50%, -50%); z-index: 900; opacity: 0; pointer-events: none;
      animation: insaneGlitch 6s infinite steps(2, end);
    }
    
    .blood-puddle-mega {
      position: fixed; bottom: -50px; left: -10%; width: 120%; height: 250px;
      background: radial-gradient(ellipse at 50% 100%, #600 0%, #300 30%, #100 60%, transparent 100%);
      z-index: 998; filter: blur(3px) contrast(1.5);
      box-shadow: inset 0 20px 50px rgba(255,0,0,0.1);
      transform: scaleY(0.5); transform-origin: bottom;
    }
    .blood-puddle-mega::after {
      content: ""; position: absolute; inset: 0;
      background: repeating-radial-gradient(circle at 50% 100%, rgba(255,0,0,0.1) 0, transparent 10px, rgba(100,0,0,0.2) 20px);
      animation: glitchPulse 4s infinite alternate;
    }

    .container { max-width: 680px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 10; }
    header { padding: 24px 0; display: flex; justify-content: flex-end; }
    .theme-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--bright); cursor: pointer; padding: 8px 16px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; transition: 0.2s; font-weight: 800; }
    body.blood-mode .theme-toggle { border-color: #f00; color: #fff; background: #900; box-shadow: 0 0 25px #f00; animation: textGlitch 0.1s infinite; }
    
    #hero { padding: 40px 0 60px; animation: fadeIn 0.6s ease-out; position: relative; z-index: 1000; }
    .badge { display: inline-flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; margin-bottom: 32px; background: var(--surface); }
    body.blood-mode .badge { color: #fcc; border-color: #f00; background: rgba(50,0,0,0.8); }
    
    .hero-name { font-family: 'JetBrains Mono', monospace; font-size: clamp(2.5rem, 8vw, 3.5rem); font-weight: 900; color: var(--bright); line-height: 1.1; margin-bottom: 12px; letter-spacing: -2px; }
    body.blood-mode .hero-name { color: #fff; animation: textGlitch 0.15s infinite; }
    .hero-sub { font-size: 1.1rem; color: var(--muted); margin-bottom: 40px; }
    body.blood-mode .hero-sub { color: #f55; font-weight: 600; }
    
    .generator-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; transition: 0.3s; position: relative; overflow: hidden; }
    body.blood-mode .generator-card { animation: glitchPulse 2s infinite; background: rgba(10,0,0,0.9); border: 2px solid #500; }
    
    .output-container { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
    body.blood-mode .output-container { border-color: #f00; background: #000; box-shadow: inset 0 0 15px rgba(255,0,0,0.3); }
    #passwordOutput { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; color: var(--bright); word-break: break-all; font-weight: 800; }
    body.blood-mode #passwordOutput { color: #f00; text-shadow: 0 0 10px #f00; }
    
    .copy-btn { background: var(--gradient); border: none; color: white; padding: 10px 16px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
    body.blood-mode .copy-btn { background: #f00; box-shadow: 0 0 15px #f00; }
    .copy-btn:hover { transform: scale(1.05); }
    
    .control-group { margin-bottom: 24px; }
    .label-row { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 600; margin-bottom: 12px; color: var(--accent); }
    input[type="range"] { width: 100%; height: 6px; accent-color: var(--primary); cursor: pointer; border-radius: 3px; }
    body.blood-mode input[type="range"] { accent-color: #f00; background: #300; }
    
    .checkbox-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 24px; }
    .check-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; transition: 0.2s; }
    body.blood-mode .check-item { border-color: #500; background: rgba(255,0,0,0.05); color: #faa; }
    .check-item:hover { border-color: var(--primary); }
    body.blood-mode .check-item:hover { border-color: #f00; background: rgba(255,0,0,0.2); }
    .check-item input { accent-color: var(--primary); width: 16px; height: 16px; }
    body.blood-mode .check-item input { accent-color: #f00; }
    
    .generate-btn { width: 100%; margin-top: 32px; padding: 18px; border-radius: 8px; border: none; background: var(--gradient); color: white; font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
    body.blood-mode .generate-btn { background: #900; border: 2px solid #f00; box-shadow: 0 0 30px rgba(255,0,0,0.4); animation: textGlitch 0.2s infinite alternate-reverse; }
    .generate-btn:hover { filter: brightness(1.2); letter-spacing: 3px; }
    
    .strength-meter { height: 6px; background: var(--border); margin-top: 16px; border-radius: 3px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0%; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    
    footer { border-top: 1px solid var(--border); padding: 32px 0; margin-top: auto; position: relative; z-index: 1000; }
    body.blood-mode footer { border-color: #500; }
    .footer-inner { max-width: 680px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); font-weight: 600; }
    body.blood-mode .footer-inner { color: #f55; }
    
    @media (max-width: 480px) { .checkbox-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-theme="dark">
  <div class="blood-overlay" id="bloodOverlay">
    <div class="rusty-pipe"></div>
    <div class="blood-puddle-mega"></div>
    <div class="scary-smile-mega" id="smile">
      <svg viewBox="0 0 600 400" width="100%" filter="drop-shadow(0 0 30px #f00)">
        <path d="M50 200 Q300 400 550 200 Q300 230 50 200" fill="#050000" stroke="#200" stroke-width="10"/>
        <g fill="#e8e8e8" stroke="#300" stroke-width="3">
          <rect x="150" y="200" width="25" height="40" rx="3"/><rect x="185" y="215" width="25" height="50" rx="3"/>
          <rect x="220" y="225" width="25" height="55" rx="3"/><rect x="255" y="230" width="25" height="60" rx="3"/>
          <rect x="290" y="230" width="25" height="60" rx="3"/><rect x="325" y="230" width="25" height="60" rx="3"/>
          <rect x="360" y="225" width="25" height="55" rx="3"/><rect x="395" y="215" width="25" height="50" rx="3"/>
          <rect x="430" y="200" width="25" height="40" rx="3"/>
        </g>
        <circle cx="200" cy="100" r="25" fill="#fff" filter="drop-shadow(0 0 15px #f00)"/><circle cx="200" cy="100" r="5" fill="#f00"/>
        <circle cx="400" cy="100" r="25" fill="#fff" filter="drop-shadow(0 0 15px #f00)"/><circle cx="400" cy="100" r="5" fill="#f00"/>
        <path d="M265 290 L265 350" stroke="#900" stroke-width="8" stroke-linecap="round" style="animation: smileBleed 1.5s infinite;"/>
        <path d="M335 290 L335 380" stroke="#b00" stroke-width="10" stroke-linecap="round" style="animation: smileBleed 2.1s infinite 0.7s;"/>
        <path d="M200 265 L190 330" stroke="#800" stroke-width="6" stroke-linecap="round" style="animation: smileBleed 1.8s infinite 0.3s;"/>
        <path d="M410 265 L420 340" stroke="#a00" stroke-width="7" stroke-linecap="round" style="animation: smileBleed 2.5s infinite 1.1s;"/>
      </svg>
    </div>
    <div id="dropsContainer"></div>
    <div id="spidersContainer"></div>
  </div>

  <div class="container">
    <header><button class="theme-toggle" id="themeToggle">LIGHT</button></header>
  </div>
  <section id="hero">
    <div class="container">
      <div class="badge" data-orig="✦ LIDECX ULTRA SYSTEM">✦ LIDECX ULTRA SYSTEM</div>
      <h1 class="hero-name" data-orig="SafePass">SafePass</h1>
      <p class="hero-sub" data-orig="Генератор паролей. Полная конфиденциальность.">Генератор паролей. Полная конфиденциальность.</p>
      <div class="generator-card">
        <div class="output-container"><span id="passwordOutput">Нажми «Создать»</span><button class="copy-btn" data-orig="COPY" onclick="copyPassword()">COPY</button></div>
        <div class="strength-meter"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="control-group" style="margin-top: 24px;">
          <div class="label-row"><span data-orig="Длина пароля">Длина пароля</span><span id="lengthVal">16</span></div>
          <input type="range" id="lengthSlider" min="4" max="64" value="16">
        </div>
        <div class="checkbox-grid">
          <label class="check-item"><input type="checkbox" id="upper" checked> <span data-orig="ВЕРХНИЙ РЕГИСТР">ВЕРХНИЙ РЕГИСТР</span></label>
          <label class="check-item"><input type="checkbox" id="lower" checked> <span data-orig="НИЖНИЙ РЕГИСТР">НИЖНИЙ РЕГИСТР</span></label>
          <label class="check-item"><input type="checkbox" id="numbers" checked> <span data-orig="ЦИФРЫ 0-9">ЦИФРЫ 0-9</span></label>
          <label class="check-item"><input type="checkbox" id="symbols" checked> <span data-orig="СИМВОЛЫ !@#">СИМВОЛЫ !@#</span></label>
        </div>
        <button class="generate-btn" data-orig="СГЕНЕРИРОВАТЬ ПАРОЛЬ" onclick="generatePassword()">СГЕНЕРИРОВАТЬ ПАРОЛЬ</button>
      </div>
    </div>
  </section>
  <footer>
    <div class="footer-inner">
      <span data-orig="© 2026 LiDECX Security">© <span id="year"></span> LiDECX Security</span>
      <span data-orig="v3.1.0">v3.1.0</span>
    </div>
  </footer>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    let dblClickTimer = null;
    let horrorIntervals = [];
    const glitchWords = ["ERROR", "FATAL", "DEATH", "RUN", "0xDEAD", "666", "!@#$%", "SYSTEM FAILURE", "BLOOD", "NO ESCAPE"];

    themeToggle.addEventListener('click', () => {
      if (dblClickTimer) {
        clearTimeout(dblClickTimer);
        dblClickTimer = null;
        body.classList.toggle('blood-mode');
        if(body.classList.contains('blood-mode')) {
          themeToggle.textContent = "DIE";
          startMeat();
        } else {
          stopMeat();
          const isDark = body.getAttribute('data-theme') === 'dark';
          themeToggle.textContent = isDark ? 'LIGHT' : 'DARK';
        }
        return;
      }
      dblClickTimer = setTimeout(() => {
        if (!body.classList.contains('blood-mode')) {
          const isDark = body.getAttribute('data-theme') === 'dark';
          const newTheme = isDark ? 'light' : 'dark';
          body.setAttribute('data-theme', newTheme);
          themeToggle.textContent = isDark ? 'DARK' : 'LIGHT';
        }
        dblClickTimer = null;
      }, 250);
    });

    function startMeat() {
      const dropTimer = setInterval(() => {
        const drop = document.createElement('div');
        drop.className = 'blood-drip';
        drop.style.left = (Math.random() * 110 - 5) + '%';
        drop.style.width = (Math.random() * 8 + 3) + 'px';
        const dur = Math.random() * 1.5 + 1;
        drop.style.animationDuration = dur + 's';
        document.getElementById('dropsContainer').appendChild(drop);
        setTimeout(() => drop.remove(), dur * 1000);
      }, 100);
      horrorIntervals.push(dropTimer);

      const textNodes = document.querySelectorAll('[data-orig]');
      const textTimer = setInterval(() => {
        if(Math.random() > 0.3) {
          const el = textNodes[Math.floor(Math.random() * textNodes.length)];
          const orig = el.getAttribute('data-orig');
          el.innerText = Math.random() > 0.5 ? glitchWords[Math.floor(Math.random() * glitchWords.length)] : generateRandomString(orig.length);
          el.style.color = '#f00';
          setTimeout(() => { el.innerText = orig; el.style.color = ''; }, Math.random() * 300 + 50);
        }
      }, 200);
      horrorIntervals.push(textTimer);

      const spiders = [];
      for(let i=0; i<5; i++) {
        const s = document.createElement('div');
        s.className = 'spider-container';
        s.style.width = (Math.random() * 30 + 40) + 'px';
        s.style.height = s.style.width;
        s.innerHTML = `
          <svg viewBox="0 0 100 100" width="100%" height="100%">
            <g transform="translate(50,50)">
              <g stroke="#111" stroke-width="4" fill="none" stroke-linecap="round">
                <path d="M-10 -5 Q-35 -25 -45 -10"><animateTransform attributeName="transform" type="rotate" values="0;20;0" dur="0.15s" repeatCount="indefinite"/></path>
                <path d="M-12 0 Q-40 0 -48 10"><animateTransform attributeName="transform" type="rotate" values="20;0;20" dur="0.15s" repeatCount="indefinite"/></path>
                <path d="M-10 5 Q-35 25 -45 35"><animateTransform attributeName="transform" type="rotate" values="0;20;0" dur="0.15s" repeatCount="indefinite"/></path>
                <path d="M-8 10 Q-25 35 -30 50"><animateTransform attributeName="transform" type="rotate" values="20;0;20" dur="0.15s" repeatCount="indefinite"/></path>
              </g>
              <g stroke="#111" stroke-width="4" fill="none" stroke-linecap="round">
                <path d="M10 -5 Q35 -25 45 -10"><animateTransform attributeName="transform" type="rotate" values="0;-20;0" dur="0.15s" repeatCount="indefinite"/></path>
                <path d="M12 0 Q40 0 48 10"><animateTransform attributeName="transform" type="rotate" values="-20;0;-20" dur="0.15s" repeatCount="indefinite"/></path>
                <path d="M10 5 Q35 25 45 35"><animateTransform attributeName="transform" type="rotate" values="0;-20;0" dur="0.15s" repeatCount="indefinite"/></path>
                <path d="M8 10 Q25 35 30 50"><animateTransform attributeName="transform" type="rotate" values="-20;0;-20" dur="0.15s" repeatCount="indefinite"/></path>
              </g>
              <ellipse cx="0" cy="5" rx="14" ry="22" fill="#050000"/>
              <circle cx="0" cy="-12" r="10" fill="#000"/>
              <circle cx="-4" cy="-16" r="2" fill="#f00" filter="drop-shadow(0 0 5px #f00)"/>
              <circle cx="4" cy="-16" r="2" fill="#f00" filter="drop-shadow(0 0 5px #f00)"/>
            </g>
          </svg>`;
        document.getElementById('spidersContainer').appendChild(s);
        spiders.push({ el: s, x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6 });
      }
      const spiderMover = setInterval(() => {
        spiders.forEach(s => {
          s.x += s.vx; s.y += s.vy;
          if(s.x < -50 || s.x > window.innerWidth + 50) s.vx *= -1;
          if(s.y < -50 || s.y > window.innerHeight + 50) s.vy *= -1;
          if(Math.random() > 0.95) { s.vx += (Math.random() - 0.5)*2; s.vy += (Math.random() - 0.5)*2; }
          s.el.style.left = s.x + 'px';
          s.el.style.top = s.y + 'px';
          s.el.style.transform = `rotate(${Math.atan2(s.vy, s.vx) * 180 / Math.PI + 90}deg)`;
        });
      }, 20);
      horrorIntervals.push(spiderMover);
    }

    function stopMeat() {
      horrorIntervals.forEach(clearInterval);
      horrorIntervals = [];
      document.getElementById('dropsContainer').innerHTML = '';
      document.getElementById('spidersContainer').innerHTML = '';
      document.querySelectorAll('[data-orig]').forEach(el => { el.innerText = el.getAttribute('data-orig'); el.style.color = ''; });
    }

    function generateRandomString(len) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
      let res = "";
      for(let i=0; i<len; i++) res += chars[Math.floor(Math.random() * chars.length)];
      return res;
    }

    function generatePassword() {
      const length = +document.getElementById('lengthSlider').value;
      let charSet = "";
      if(document.getElementById('upper').checked) charSet += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if(document.getElementById('lower').checked) charSet += "abcdefghijklmnopqrstuvwxyz";
      if(document.getElementById('numbers').checked) charSet += "0123456789";
      if(document.getElementById('symbols').checked) charSet += "!@#$%^&*()_+~|}{[]:;?><,./-=";
      
      if(!charSet) {
        document.getElementById('passwordOutput').innerText = body.classList.contains('blood-mode') ? "CHOOSE YOUR FATE" : "ВЫБЕРИТЕ ПАРАМЕТРЫ";
        return;
      }
      
      let pass = "";
      const vals = new Uint32Array(length);
      window.crypto.getRandomValues(vals);
      for(let i=0; i<length; i++) pass += charSet[vals[i] % charSet.length];
      document.getElementById('passwordOutput').innerText = pass;
      
      let score = (length/64)*50;
      if(document.getElementById('lower').checked) score += 10;
      if(document.getElementById('upper').checked) score += 10;
      if(document.getElementById('numbers').checked) score += 15;
      if(document.getElementById('symbols').checked) score += 15;
      
      const fill = document.getElementById('strengthFill');
      fill.style.width = Math.min(score, 100) + "%";
      fill.style.background = body.classList.contains('blood-mode') ? (score > 70 ? "#900" : "#f00") : (score > 70 ? "var(--green)" : score > 40 ? "#fbbf24" : "#ef4444");
    }

    async function copyPassword() {
      const p = document.getElementById('passwordOutput').innerText;
      if(p.includes(" ")) return;
      await navigator.clipboard.writeText(p);
      const b = document.querySelector('.copy-btn'); 
      b.innerText = body.classList.contains('blood-mode') ? "INFECTED" : "СКОПИРОВАНО";
      setTimeout(() => b.innerText = b.getAttribute('data-orig'), 1500);
    }

    document.getElementById('lengthSlider').oninput = (e) => { document.getElementById('lengthVal').innerText = e.target.value; generatePassword(); };
    document.getElementById('year').innerText = new Date().getFullYear();
    document.querySelectorAll('.check-item input').forEach(cb => cb.onchange = generatePassword);
    generatePassword();
  </script>
</body>
</html>
